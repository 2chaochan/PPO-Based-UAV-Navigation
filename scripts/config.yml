Training:
  # 单帧图像缺少运动信息；堆叠 4 帧可以让策略感知洞口的相对运动。
  frame_stack: 4
  total_timesteps: 500000
  n_steps: 1024
  batch_size: 64
  n_epochs: 10
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  checkpoint_freq: 10000
  success_window: 100
  min_success_episodes: 50

TrainEnv:
  speed: 0.4
  action_duration: 1.0
  settle_duration: 0.05
  random_start_range: 1.0
  success_distance: 3.7
  max_episode_steps: 20
  test_max_episode_steps: 500
  camera_fov_degrees: 120
  hole_radius: 0.30

  reward:
    progress_scale: 20.0
    alignment_scale: 2.0
    alignment_sigma: 0.45
    forward_scale: 0.5
    step_penalty: 0.05
    success_reward: 100.0
    collision_penalty: -100.0
    lost_target_penalty: -50.0
    timeout_penalty: -30.0

  sections:
  - target:
    - 1
    - -0.5
    offset:
    - 0

  - target:
    - -1.5
    - 1
    offset:
    - 4

  - target:
    - 0.5
    - -1
    offset:
    - 8

  - target:
    - -1.5
    - -1
    offset:
    - 12

  - target:
    - 0
    - 1
    offset:
    - 16
  
  - target:
    - 1.5
    - 0.5
    offset:
    - 20

  - target:
    - 1
    - -0.5
    offset:
    - 24

  - target:
    - -1
    - -0.5
    offset:
    - 28

  - target:
    - 0
    - 0
    offset:
    - 32
